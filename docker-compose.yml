# ---- Bilal Home Adhan System ----
# Orchestrates the Web UI, Adhan Scheduler, and Watchtower for auto-updates.

# Cap every container's logs. Docker's default json-file driver is UNBOUNDED —
# a misbehaving container (a pychromecast reconnect storm) once grew a single
# log file to 53GB and filled a Pi's SD card to 100%, which truncated
# config.json and took the unit dark. 10MB x 3 files = 30MB hard ceiling each.
# (The Pis also set this as a daemon-wide default in /etc/docker/daemon.json;
# this per-service stanza is the version-controlled, self-documenting copy.)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # --- Web Dashboard ---
  # Runs on the host network because the "Discover Speakers" endpoint calls
  # pychromecast, which uses mDNS multicast on 224.0.0.251:5353. Docker's
  # default bridge network does not forward multicast traffic, so a bridged
  # web container would always return an empty speaker list. Host networking
  # is also fine from a security standpoint: this is a single-purpose
  # appliance where we WANT port 5000 exposed directly on LAN + Tailscale.
  web:
    image: ghcr.io/stmehmet/bilal-web:latest
    container_name: bilal-web
    restart: unless-stopped
    logging: *default-logging
    network_mode: host          # Required for mDNS / Chromecast discovery
    volumes:
      - bilal-data:/data
      - ./audio:/audio:ro
    environment:
      - CONFIG_DIR=/data
      - AUDIO_DIR=/audio
      - SCHEDULER_PATH=/app/scheduler
      - WEB_PORT=5000
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      # Wake-settle for display/hub devices (Nest Hub). See .env.example.
      - DISPLAY_WAKE_SETTLE_SECONDS=${DISPLAY_WAKE_SETTLE_SECONDS:-3.0}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Run as non-root inside container (USER directive in Dockerfile)

  # --- Adhan Scheduler ---
  scheduler:
    image: ghcr.io/stmehmet/bilal-scheduler:latest
    container_name: bilal-scheduler
    restart: unless-stopped
    logging: *default-logging
    network_mode: host          # Required for mDNS / Chromecast discovery
    volumes:
      - bilal-data:/data
      - ./audio:/audio:ro
    environment:
      - CONFIG_DIR=/data
      - AUDIO_DIR=/audio
      - WEB_PORT=5000
      # Optional dead-man's-switch ping URL (see .env.example). No-op if unset.
      - HEALTHCHECK_PING_URL=${HEALTHCHECK_PING_URL:-}
      # Wake-settle for display/hub devices (Nest Hub). See .env.example.
      - DISPLAY_WAKE_SETTLE_SECONDS=${DISPLAY_WAKE_SETTLE_SECONDS:-3.0}
    depends_on:
      web:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # --- Watchtower (automatic Docker image updates) ---
  # NOTE: use nickfedor/watchtower (actively maintained fork). The original
  # containrrr/watchtower is abandoned and ships an old moby client that
  # speaks Docker API v1.25, which Docker Engine 25+ refuses to serve.
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: bilal-watchtower
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600       # Check every hour
      - WATCHTOWER_LABEL_ENABLE=true        # Only update labelled containers
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  bilal-data:
    driver: local
