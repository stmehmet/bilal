name: Build & Push Multi-Arch Docker Images

on:
  # CI side (test job): validate every PR + merge queue entry
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
  merge_group:
  # Deploy side (build job): build & push images on main + release tags.
  # No paths filter here: a push `paths` filter also applies to tag pushes
  # and can silently suppress release-tag deploys. Docs-only main pushes will
  # rebuild images; split releases into a separate workflow if that matters.
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# CI (PR/merge_group) runs cancel redundant in-flight runs; never interrupt a
# push:main / tag image build & push (deploy) — those serialize implicitly.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/bilal-web
  IMAGE_SCHEDULER: ghcr.io/${{ github.repository_owner }}/bilal-scheduler

jobs:
  test:
    # Skip CI on draft PRs; always run for push / merge_group / dispatch
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install pytz

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    needs: test
    # Deploy only on push (main + tags) and manual dispatch — never on
    # merge_group: a queue entry must not push images for a transient ref.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for ARM64 cross-compilation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker meta (scheduler)
        id: meta-scheduler
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_SCHEDULER }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push web image (AMD64 + ARM64)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push scheduler image (AMD64 + ARM64)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: scheduler
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-scheduler.outputs.tags }}
          labels: ${{ steps.meta-scheduler.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
