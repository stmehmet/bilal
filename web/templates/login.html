    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-4">
      {% for cat, msg in messages %}
      <div class="bg-red-900/50 border border-red-700 text-red-200 px-4 py-2 rounded-lg text-sm">{{ msg }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
      {% if first_time %}
      <p class="text-slate-300 text-sm">Welcome! Create a password to protect your dashboard.</p>
      {% endif %}
      <div>
        <label class="block text-slate-300 text-sm mb-1">Password</label>
        <input type="password" name="password" required minlength="8"
               class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white
                      focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none">
      </div>
      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 rounded-lg
                     transition-colors">
        {{ "Create Password" if first_time else "Login" }}
      </button>
    </form>
  </div>
