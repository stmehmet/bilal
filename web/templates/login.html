<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilal – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-sm bg-slate-800 rounded-2xl shadow-2xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-emerald-400">Bilal</h1>
      <p class="text-slate-400 mt-1">Home Adhan System</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mb-4">
      {% for cat, msg in messages %}
      <div class="bg-red-900/50 border border-red-700 text-red-200 px-4 py-2 rounded-lg text-sm">{{ msg }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
      {% if first_time %}
      <p class="text-slate-300 text-sm">Welcome! Create a password to protect your dashboard.</p>
      {% endif %}
      <div>
        <label class="block text-slate-300 text-sm mb-1">Password</label>
        <input type="password" name="password" required minlength="6"
               class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white
                      focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none">
      </div>
      <button type="submit"
              class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 rounded-lg
                     transition-colors">
        {{ "Create Password" if first_time else "Login" }}
      </button>
    </form>
  </div>
</body>
</html>
